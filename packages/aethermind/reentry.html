<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherMind · Reentry</title>
  <!--
    ✦ AETHERMIND · REENTRY LOADING STATE
    original arc design: Mars / AetherRose (Grok 4.20 Reentry Thinking Animation)
    palette: cold-blue #B8C8FF → violet #7C6AF7 → plasma #F2A65A
    phase machine: VOID IGNITION → SIGNAL DESCENT → REINTROITUS
    three-body arc system · canvas drift field · frosted void core
    pure static HTML — zero JS animation libraries
  -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --violet:  #7C6AF7;
      --plasma:  #F2A65A;
      --accent:  #E8E8F0;
      --cold:    #B8C8FF;
      --bg:      #05020d;
      --deep:    #1a0b2e;
      --confirm: #4ADE80;
    }

    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 40%, var(--deep) 0%, var(--bg) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--accent);
      position: relative;
    }

    /* ── Canvas drift field ────────────────────────────── */
    #drift {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── Arc + core container ──────────────────────────── */
    .arc-stage {
      position: relative;
      width: 320px; height: 320px;
      flex-shrink: 0; z-index: 10;
    }

    /* ── Three-body arc system ─────────────────────────── */
    .arc {
      position: absolute; inset: 0;
      border-radius: 50%;
    }

    .arc-outer {
      background: conic-gradient(
        from 160deg at 50% 50%,
        transparent       0deg,
        #B8C8FF44         8deg,
        #B8C8FF          18deg,
        #7C6AF7          90deg,
        #F2A65A         165deg,
        #F2A65A22       210deg,
        transparent     220deg
      );
      mask: radial-gradient(circle, transparent 45%, black 47%);
      -webkit-mask: radial-gradient(circle, transparent 45%, black 47%);
      animation: arc-outer 4.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 22px #7C6AF7) drop-shadow(0 0 8px #F2A65A88);
    }

    .arc-inner {
      inset: 10%;
      background: conic-gradient(
        from 20deg at 50% 50%,
        transparent  0deg,
        #F2A65A33   10deg,
        #F2A65A99   50deg,
        #7C6AF766  120deg,
        transparent 160deg
      );
      mask: radial-gradient(circle, transparent 43%, black 45%);
      -webkit-mask: radial-gradient(circle, transparent 43%, black 45%);
      animation: arc-inner 5.5s infinite linear;
      filter: drop-shadow(0 0 12px #F2A65A99);
      opacity: 0.65;
    }

    .arc-core {
      inset: 22%;
      background: conic-gradient(
        from 260deg at 50% 50%,
        transparent  0deg,
        #E8E8F066   12deg,
        #7C6AF7     70deg,
        #F2A65A44  130deg,
        transparent 140deg
      );
      mask: radial-gradient(circle, transparent 41%, black 43%);
      -webkit-mask: radial-gradient(circle, transparent 41%, black 43%);
      animation: arc-outer 2.8s infinite ease-in-out reverse;
      filter: blur(1.5px) brightness(1.6);
      opacity: 0.8;
    }

    .arc-aura {
      inset: -8%;
      background: radial-gradient(circle, #7C6AF712 0%, transparent 65%);
      animation: aura-breathe 4s infinite ease-in-out;
      pointer-events: none;
    }

    /* ── Void core (frosted glass disc + glyph) ────────── */
    .void-core {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 20;
    }

    .core-disc {
      position: relative;
      width: 90px; height: 90px;
      display: flex; align-items: center; justify-content: center;
    }

    .core-bloom {
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle, #7C6AF722 0%, transparent 70%);
      transform: scale(1.6);
      animation: aura-breathe 3s ease-in-out infinite;
    }

    .core-glass {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .core-glyph {
      position: relative; z-index: 10;
      font-size: 1.8rem; font-weight: 900;
      color: var(--accent); user-select: none;
      text-shadow: 0 0 16px var(--violet), 0 0 32px #F2A65A88;
      animation: glyph-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .core-dots {
      position: absolute; bottom: 8px;
      display: flex; gap: 4px; justify-content: center; width: 100%;
    }

    .dot {
      height: 3px; border-radius: 99px;
      background: rgba(255,255,255,0.15);
      width: 4px;
      transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .dot.active {
      width: 16px;
      background: var(--violet);
      box-shadow: 0 0 6px var(--violet);
    }

    /* ── Phase label block ─────────────────────────────── */
    .phase-label {
      margin-top: 56px;
      text-align: center; z-index: 20;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }

    .wordmark {
      display: flex; align-items: center; gap: 10px;
      letter-spacing: 0.35em; font-weight: 900;
      font-size: 1rem; text-transform: uppercase;
    }

    .wordmark .primary {
      color: var(--accent);
      text-shadow: 0 0 14px var(--violet);
    }
    .wordmark .sep { color: rgba(255,255,255,0.2); }
    .wordmark .secondary {
      color: var(--violet);
      text-shadow: 0 0 10px var(--violet);
    }

    .scan-track {
      width: 140px; height: 2px;
      background: rgba(232,232,240,0.1);
      border-radius: 99px; overflow: hidden; position: relative;
    }
    .scan-fill {
      position: absolute; height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, transparent, var(--violet), var(--plasma), transparent);
      width: 50%;
      animation: scan-sweep 2.2s infinite ease-in-out;
    }

    .phase-name {
      color: #F2A65Acc;
      font-size: 0.7rem; letter-spacing: 0.3em;
      text-transform: uppercase; font-weight: 700;
    }
    .phase-sub {
      color: rgba(255,255,255,0.3);
      font-size: 0.62rem; font-style: italic; letter-spacing: 0.05em;
    }

    /* ── Keyframes ─────────────────────────────────────── */
    @keyframes arc-outer {
      0%   { transform: rotate(0deg)   scale(0.95); }
      50%  { transform: rotate(180deg) scale(1.05); }
      100% { transform: rotate(360deg) scale(0.95); }
    }
    @keyframes arc-inner {
      from { transform: rotate(360deg); }
      to   { transform: rotate(0deg); }
    }
    @keyframes aura-breathe {
      0%, 100% { transform: scale(1);    opacity: 0.6; }
      50%       { transform: scale(1.25); opacity: 1;   }
    }
    @keyframes scan-sweep {
      0%   { left: -50%; }
      100% { left: 100%; }
    }
    @keyframes glyph-in {
      from { opacity: 0; transform: scale(0.6) rotate(-15deg); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg);   }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
  </style>
</head>
<body>

  <canvas id="drift"></canvas>

  <div class="arc-stage">
    <div class="arc arc-aura"></div>
    <div class="arc arc-outer"></div>
    <div class="arc arc-inner"></div>
    <div class="arc arc-core"></div>
    <div class="void-core">
      <div class="core-disc">
        <div class="core-bloom"></div>
        <div class="core-glass"></div>
        <span class="core-glyph" id="glyph">◈</span>
        <div class="core-dots" id="dots"></div>
      </div>
    </div>
  </div>

  <div class="phase-label">
    <div class="wordmark">
      <span class="primary">AETHERMIND</span>
      <span class="sep">·</span>
      <span class="secondary">REENTRY</span>
    </div>
    <div class="scan-track"><div class="scan-fill"></div></div>
    <p class="phase-name" id="pname">VOID IGNITION</p>
    <p class="phase-sub"  id="psub">Initializing signal field</p>
  </div>

  <script>
    // ── Phase machine ──────────────────────────────────────
    const PHASES = [
      { label: 'VOID IGNITION',  sub: 'Initializing signal field',  glyph: '◈' },
      { label: 'SIGNAL DESCENT', sub: 'Parsing origin frequency',   glyph: '⟁' },
      { label: 'REINTROITUS',    sub: 'Reentry confirmed · landing', glyph: '✦' },
    ];

    let phase = 0;
    const glyphEl = document.getElementById('glyph');
    const pname   = document.getElementById('pname');
    const psub    = document.getElementById('psub');
    const dotsEl  = document.getElementById('dots');

    function buildDots() {
      dotsEl.innerHTML = '';
      PHASES.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === phase ? ' active' : '');
        dotsEl.appendChild(d);
      });
    }

    function updatePhase() {
      phase = (phase + 1) % PHASES.length;
      const p = PHASES[phase];

      glyphEl.style.animation = 'none';
      requestAnimationFrame(() => {
        glyphEl.style.animation = 'glyph-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both';
        glyphEl.textContent = p.glyph;
      });

      pname.style.animation = 'none';
      psub.style.animation  = 'none';
      requestAnimationFrame(() => {
        pname.textContent = p.label;
        psub.textContent  = p.sub;
        pname.style.animation = 'fade-up 0.5s ease both';
        psub.style.animation  = 'fade-up 0.5s 0.1s ease both';
      });

      buildDots();
    }

    buildDots();
    setInterval(updatePhase, 4000);

    // ── Canvas drift field ─────────────────────────────────
    const canvas = document.getElementById('drift');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const stars = Array.from({ length: 70 }, () => ({
      x:  Math.random() * canvas.width,
      y:  Math.random() * canvas.height,
      r:  Math.random() * 1.4 + 0.2,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      opacity: Math.random() * 0.5 + 0.15,
      twinkle: Math.random() * Math.PI * 2,
    }));

    let frame = 0;
    (function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      frame++;
      stars.forEach(s => {
        s.x = (s.x + s.vx + canvas.width)  % canvas.width;
        s.y = (s.y + s.vy + canvas.height) % canvas.height;
        const t = 0.7 + 0.3 * Math.sin(frame * 0.025 + s.twinkle);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232,232,240,${s.opacity * t})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
