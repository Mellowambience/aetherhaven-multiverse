name: Ghostline Security Gate

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  ghostline-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  -- re-enable after package-lock.json exists (post migration)
      - name: Check for lockfile
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "HAS_LOCKFILE=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_LOCKFILE=false" >> $GITHUB_OUTPUT
            echo "Scaffold mode — Ghostline will run full scan once packages are installed."
          fi
      - run: npm ci --workspace=packages/ghostline
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
      - name: VaultCheck
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: npx turbo audit --filter=ghostline -- --module=vault-check
        env:
          GHOSTLINE_FAIL_ON: CRITICAL,HIGH
      - name: ShadowAudit
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: npm audit --audit-level=high --workspaces
      - name: GhostScan
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: npx turbo audit --filter=ghostline -- --module=ghost-scan --diff-only
        env:
          GHOSTLINE_BASE_REF: ${{ github.base_ref }}
      - name: PhantomTrace
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: npx turbo audit --filter=ghostline -- --module=phantom-trace
      - name: Post report to PR
        if: github.event_name == 'pull_request' && steps.check.outputs.HAS_LOCKFILE == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const p = 'packages/ghostline/audit-report/latest.md';
            if (fs.existsSync(p)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '## Ghostline Security Report\n\n' + fs.readFileSync(p, 'utf8')
              });
            }
