name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploy each site to GitHub Pages from its subdirectory
# Each site needs its own GitHub Pages configuration in the source repo settings.
# After migration, update each site's GitHub Pages source to point to the
# corresponding subdirectory OR use a deploy action per site.

jobs:
  deploy-summary:
    name: Log deploy event
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Summarize what changed
        run: |
          echo "🜂 Aetherhaven Multiverse — deploy triggered"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Sites in multiverse:"
          for site in sites/mars-portfolio sites/bluebird-song sites/meghan-kylie; do
            if [ -d "$site" ]; then
              echo "  ✅ $site — $(find $site -name '*.html' | wc -l) HTML files"
            else
              echo "  ⏳ $site — not yet migrated"
            fi
          done

      - name: Notify (when Supabase is configured)
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            curl -s -X POST "$SUPABASE_URL/rest/v1/transmission_feed" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -d '{"type":"deploy","source":"github_actions","message":"Aetherhaven Multiverse deployed — main","status":"success"}'
            echo "Swarm Room notified."
          else
            echo "Supabase not configured yet — skipping Swarm Room notification."
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
