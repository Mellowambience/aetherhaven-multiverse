name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  validate-html:
    name: Validate HTML sites
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken internal links
        run: |
          echo "Checking site files exist..."
          for site in sites/mars-portfolio sites/bluebird-song sites/meghan-kylie; do
            if [ -d "$site" ]; then
              echo "  ✅ $site exists"
              ls "$site"/*.html 2>/dev/null && echo "     HTML files found" || echo "     No HTML files yet (post-migration)"
            else
              echo "  ⏳ $site not yet migrated — scaffold mode"
            fi
          done

      - name: Lint CSS files
        run: |
          # Basic CSS syntax check
          for css in $(find sites/ -name "*.css" 2>/dev/null); do
            echo "Checking $css..."
          done
          echo "CSS check complete."
        continue-on-error: true

  security-check:
    name: Ghostline security check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: VaultCheck — scan for exposed secrets in site files
        run: |
          echo "Running VaultCheck across all site files..."
          PATTERNS=("sk-[a-zA-Z0-9]{32,}" "ghp_[a-zA-Z0-9]{36}" "SUPABASE_SERVICE_ROLE" "-----BEGIN.*PRIVATE KEY-----" "RAILWAY_TOKEN" "VERCEL_TOKEN" "stripe_live_sk_" "AIza[0-9A-Za-z-_]{35}")
          FOUND=0
          for FILE in $(find sites/ -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) 2>/dev/null); do
            for P in "${PATTERNS[@]}"; do
              if grep -qE "$P" "$FILE" 2>/dev/null; then
                echo "  ❌ VAULT CHECK FAIL: Possible secret in $FILE"
                FOUND=1
              fi
            done
          done
          if [ $FOUND -eq 1 ]; then
            echo "Ghostline blocked: secrets detected in site files."
            exit 1
          fi
          echo "  ✅ VaultCheck passed — no secrets detected"

      - name: PhantomTrace — check for unexpected external calls in JS
        run: |
          echo "Scanning JS files for unexpected outbound calls..."
          for JS in $(find sites/ -name "*.js" 2>/dev/null); do
            echo "  Checking $JS..."
            # Flag any fetch/XHR calls to non-expected domains
            grep -n "fetch\|XMLHttpRequest\|axios" "$JS" 2>/dev/null || true
          done
          echo "  PhantomTrace scan complete."
        continue-on-error: true
