name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  -- re-enable after package-lock.json exists (post migration)
      - name: Check for lockfile
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "HAS_LOCKFILE=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_LOCKFILE=false" >> $GITHUB_OUTPUT
            echo "Scaffold mode — no lockfile yet. Skipping install/build."
          fi
      - run: npm ci
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
      - run: npx turbo type-check
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
      - run: npx turbo lint
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
      - run: npx turbo build
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - run: npx turbo test
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
