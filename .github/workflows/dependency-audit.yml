name: Weekly Deep Security Audit

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  deep-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  -- re-enable after package-lock.json exists (post migration)
      - name: Check for lockfile
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "HAS_LOCKFILE=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_LOCKFILE=false" >> $GITHUB_OUTPUT
            echo "Scaffold mode — skipping deep audit until packages are installed."
          fi
      - run: npm ci
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
      - name: Full CVE scan
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: |
          npm audit --workspaces --json > audit-report-npm.json || true
          npx osv-scanner --recursive --format sarif . > osv-report.sarif || true
      - name: GhostDNS
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: npx turbo audit --filter=ghostline -- --module=ghost-dns
        env:
          GHOSTLINE_DNS_DOMAINS: "aetherhaven.io,aetherrose.io,humanpalette.app"
      - name: PhantomTrace full
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: npx turbo audit --filter=ghostline -- --module=phantom-trace --full
      - name: License compliance
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: npx license-checker --onlyAllow 'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;CC0-1.0' --excludePrivatePackages
      - name: VaultCheck full repo
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        run: npx turbo audit --filter=ghostline -- --module=vault-check --full-repo
      - name: Upload SARIF
        if: steps.check.outputs.HAS_LOCKFILE == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-report.sarif
        continue-on-error: true
