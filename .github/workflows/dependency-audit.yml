name: Weekly Deep Security Audit

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  deep-audit:
    name: Full Ghostline deep audit — all sites
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: VaultCheck — full repo secret scan
        run: |
          echo "Full repository VaultCheck..."
          PATTERNS=("sk-[a-zA-Z0-9]{32,}" "ghp_[a-zA-Z0-9]{36}" "SUPABASE_SERVICE_ROLE" "-----BEGIN.*PRIVATE KEY-----" "RAILWAY_TOKEN" "VERCEL_TOKEN" "stripe_live_sk_" "AIza[0-9A-Za-z-_]{35}")
          FOUND=0
          for FILE in $(find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -not -path "./.git/*" 2>/dev/null); do
            for P in "${PATTERNS[@]}"; do
              if grep -qE "$P" "$FILE" 2>/dev/null; then
                echo "❌ $FILE — $P"
                FOUND=1
              fi
            done
          done
          [ $FOUND -eq 0 ] && echo "✅ Full VaultCheck passed"

      - name: PhantomTrace — full JS behavioral audit
        run: |
          echo "Full PhantomTrace scan..."
          for JS in $(find sites/ -name "*.js" 2>/dev/null); do
            echo "=== $JS ==="
            grep -n "fetch\|XMLHttpRequest\|WebSocket\|eval\|document\.write\|innerHTML\s*=" "$JS" 2>/dev/null || echo "  Clean"
          done

      - name: ShadowAudit — CDN version audit + inline script check
        run: |
          echo "ShadowAudit: checking all HTML files..."
          for HTML in $(find sites/ -name "*.html" 2>/dev/null); do
            echo "=== $HTML ==="
            echo "  External scripts:"
            grep -oE 'src="https?://[^"]*\.js[^"]*"' "$HTML" 2>/dev/null || echo "  None"
            echo "  Inline script blocks:"
            grep -c "<script>" "$HTML" 2>/dev/null && echo " inline script blocks found" || echo "  0"
          done

      - name: GhostDNS — external domain reference audit
        run: |
          echo "GhostDNS: auditing all external domain references..."
          grep -roh 'https\?://[^/"]*' sites/ 2>/dev/null | sort | uniq -c | sort -rn | head -30 || echo "No external references found"

      - name: Generate audit summary
        run: |
          echo "# Ghostline Weekly Audit — $(date -u +%Y-%m-%d)" > audit-summary.md
          echo "Sites scanned: mars-portfolio, bluebird-song, meghan-kylie" >> audit-summary.md
          echo "Status: Complete" >> audit-summary.md
          cat audit-summary.md

      - name: Upload audit summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostline-audit-${{ github.run_number }}
          path: audit-summary.md
          retention-days: 90
